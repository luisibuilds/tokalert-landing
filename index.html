/* ═══════ WEATHER FETCHER ═══════ */
async function fetchOpenWeather(lat,lng,apiKey){
  try{
    const url=`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lng}&appid=${apiKey}&units=metric`;
    const res=await fetch(url);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const d=await res.json();
    return{
      temperature:+(d.main?.temp||0).toFixed(1),
      pressure:+(d.main?.pressure||1013).toFixed(1),
      humidity:d.main?.humidity||50,
      windSpeed:+(d.wind?.speed||0).toFixed(1),
      rainfall:+((d.rain?.["1h"]||d.rain?.["3h"]||0)).toFixed(2),
      weatherDesc:d.weather?.[0]?.description||"",
      weatherIcon:d.weather?.[0]?.icon||"",
      success:true,
    };
  }catch(e){
    console.error("OpenWeather fetch error:",e);
    return{success:false,error:e.message};
  }
}

async function fetchFIRMS(apiKey){
  try{
    const url=`https://firms.modaps.eosdis.nasa.gov/api/area/csv/${apiKey}/VIIRS_SNPP_NRT/world/1/2025-01-01`;
    return{active:true,hotspots:0,lastCheck:new Date().toLocaleTimeString()};
  }catch(e){return{active:false,error:e.message};}
}

/* ═══════ PI LIVE DATA FETCHER ═══════ */
// Maps the Pi's /api/status JSON to dashboard format
// Pi returns: {risk_level, risk_percent, moisture, rainfall, vibration, temperature, pressure, message, location, last_update}
// Dashboard expects: {moisture, vibration(bool), temperature, pressure, rainfall, humidity, windSpeed, risk}
async function fetchPiLiveData(url){
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),5000); // 5s timeout
    const res=await fetch(url,{signal:controller.signal});
    clearTimeout(timeout);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const d=await res.json();
    return{
      success:true,
      moisture:+(d.moisture||0).toFixed(1),
      vibration:d.vibration===1||d.vibration===true||d.vibration==="yes",
      temperature:+(d.temperature||0).toFixed(1),
      pressure:+(d.pressure||1013).toFixed(1),
      rainfall:+(d.rainfall||0).toFixed(2),
      humidity:d.humidity||50,
      windSpeed:+(d.wind_speed||d.windSpeed||0).toFixed(1),
      risk:+(d.risk_percent||d.risk||0).toFixed(1),
      riskLevel:d.risk_level||"green",
      message:d.message||"",
      location:d.location||"",
      lastUpdate:d.last_update||null,
      piConnected:true,
    };
  }catch(e){
    return{success:false,piConnected:false,error:e.message};
  }
}

/* ═══════ SIMULATION ═══════ */
function genTS(station){
  const now=Date.now(),pts=96,data=[];
  // Current values — the last point MUST match these
  const curM=station.data.moisture,curT=station.data.temperature;
  const curP=station.data.pressure,curR=station.data.risk;
  // Build backwards from current values with gentle historical variation
  const rawData=[];
  for(let i=pts-1;i>=0;i--){
    const t=now-(pts-1-i)*15*60*1000;
    const h=new Date(t).getHours();
    const age=(pts-1-i); // how many steps back from now (0 = most recent)
    const d=Math.sin((h-6)*Math.PI/12);
    // Drift increases with distance from present
    const driftScale=Math.min(age/pts,1)*0.6;
    const m=Math.max(5,Math.min(90,curM+d*3*driftScale+Math.sin(age/12)*4*driftScale+(Math.random()-0.5)*2*driftScale));
    const tp=Math.max(-5,Math.min(40,curT+d*5*driftScale+Math.sin(age/15)*2*driftScale+(Math.random()-0.5)*1.5*driftScale));
    const pr=Math.max(990,Math.min(1030,curP+Math.sin(age/20)*3*driftScale+(Math.random()-0.5)*1*driftScale));
    const r=Math.max(2,Math.min(95,curR+Math.sin(age/10)*3*driftScale+(Math.random()-0.5)*2*driftScale));
    rawData.push({time:new Date(t).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
      timestamp:t,moisture:+m.toFixed(1),temperature:+tp.toFixed(1),pressure:+pr.toFixed(1),risk:+r.toFixed(1)});
  }
  // Reverse so index 0 is oldest, last is most recent
  rawData.reverse();
  // Force the very last point to exactly match current readings
  if(rawData.length>0){
    const last=rawData[rawData.length-1];
    last.moisture=curM;last.temperature=curT;last.pressure=curP;last.risk=curR;
  }
  return rawData;
}

function simStep(s){
  // Skip simulation for stations with active Pi connection
  if(s.piConnected)return s;
  const bm=20+s.baseRisk*0.5,mr=0.06;
  const dm=(Math.random()-0.5)*1.2+(bm-s.data.moisture)*mr;
  const nm=Math.max(5,Math.min(90,s.data.moisture+dm));
  // If weather is from API, keep those values; only simulate sensor readings
  const nt=s.weatherSource==="live"?s.data.temperature:Math.max(0,Math.min(35,s.data.temperature+(Math.random()-0.5)*0.2));
  const np=s.weatherSource==="live"?s.data.pressure:Math.max(990,Math.min(1030,s.data.pressure+(Math.random()-0.5)*0.3));
  const nv=Math.random()>0.997;
  const nr=s.weatherSource==="live"?s.data.rainfall:Math.max(0,Math.min(50,s.data.rainfall+(Math.random()-0.5)*0.6+((s.baseRisk>20?0.8:0.15)-s.data.rainfall)*0.1));
  const sm=s.soilType==="clay"?2:s.soilType==="sandy"?1:s.soilType==="rocky"?0.8:1.4;
  const hm=s.historicalRisk==="high"?1.5:s.historicalRisk==="medium"?1:0.5;
  const raw=(0.25*(nm/100)+0.20*Math.min(s.slopeAngle/45,1)+0.15*Math.min(sm/2,1)+
    0.15*(nv?1:0.03)+0.10*(Math.abs(dm)/5)+0.08*(hm/1.5)+
    0.04*Math.max(0,(30-nt)/40)+0.03*Math.max(0,(1020-np)/40))*100;
  const risk=Math.max(2,Math.min(98,raw+(s.baseRisk-raw)*0.1));
  return{...s,data:{...s.data,moisture:+nm.toFixed(1),
    temperature:s.weatherSource==="live"?s.data.temperature:+nt.toFixed(1),
    pressure:s.weatherSource==="live"?s.data.pressure:+np.toFixed(1),
    vibration:nv,
    rainfall:s.weatherSource==="live"?s.data.rainfall:+nr.toFixed(1),
    risk:+risk.toFixed(1)}};
}

/* ═══════ INTERACTIVE GRAPH ═══════ */
function InteractiveGraph({data,dataKey,color,unit,height=70,thresholds}){
  const[hover,setHover]=useState(null);
  const svgRef=useRef(null);
  if(!data||!data.length)return null;
  const W=600,H=height,pad={top:4,bottom:16,left:36,right:8};
  const gW=W-pad.left-pad.right,gH=H-pad.top-pad.bottom;
  const vals=data.map(d=>d[dataKey]);
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const gX=i=>pad.left+(i/(data.length-1))*gW;
  const gY=v=>pad.top+gH-((v-mn)/rng)*gH;
  const pathD=vals.map((v,i)=>`${i===0?"M":"L"}${gX(i)},${gY(v)}`).join(" ");
  const areaD=pathD+` L${gX(data.length-1)},${pad.top+gH} L${pad.left},${pad.top+gH} Z`;
  const yT=[];for(let i=0;i<=4;i++){const v=mn+(rng/4)*i;yT.push({y:gY(v),l:v.toFixed(v>=100?0:1)});}
  const xT=[];for(let i=0;i<data.length;i+=16)xT.push({x:gX(i),l:data[i].time});
  const uid=useRef(dataKey+Math.random().toString(36).substr(2,5)).current;
  function onMM(e){
    const svg=svgRef.current;if(!svg)return;
    const rect=svg.getBoundingClientRect();
    const mx2=(e.clientX-rect.left)/rect.width*W;
    const idx=Math.round(((mx2-pad.left)/gW)*(data.length-1));
    if(idx>=0&&idx<data.length)setHover({idx,x:gX(idx),y:gY(vals[idx]),v:vals[idx],t:data[idx].time});
  }
  return(
    <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none"
      style={{display:"block",cursor:"crosshair"}} onMouseMove={onMM} onMouseLeave={()=>setHover(null)}>
      <defs><linearGradient id={`g-${uid}`} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity="0.2"/><stop offset="100%" stopColor={color} stopOpacity="0.01"/>
      </linearGradient></defs>
      {yT.map((y,i)=><line key={i} x1={pad.left} y1={y.y} x2={W-pad.right} y2={y.y} stroke="#1e293b" strokeWidth="0.5"/>)}
      {thresholds&&thresholds.map((th,i)=>{
        if(th.value<mn||th.value>mx)return null;
        return <line key={`t${i}`} x1={pad.left} y1={gY(th.value)} x2={W-pad.right} y2={gY(th.value)}
          stroke={th.color} strokeWidth="0.8" strokeDasharray="4,3" opacity="0.4"/>;
      })}
      <path d={areaD} fill={`url(#g-${uid})`}/>
      <path d={pathD} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      {yT.map((y,i)=><text key={i} x={pad.left-4} y={y.y+3} textAnchor="end" fill="#475569" fontSize="8" fontFamily="'JetBrains Mono'">{y.l}</text>)}
      {xT.map((x,i)=><text key={i} x={x.x} y={H-2} textAnchor="middle" fill="#475569" fontSize="7" fontFamily="'JetBrains Mono'">{x.l}</text>)}
      {hover&&<>
        <line x1={hover.x} y1={pad.top} x2={hover.x} y2={pad.top+gH} stroke="#94a3b8" strokeWidth="0.5" strokeDasharray="3,2"/>
        <line x1={pad.left} y1={hover.y} x2={W-pad.right} y2={hover.y} stroke="#94a3b8" strokeWidth="0.5" strokeDasharray="3,2"/>
        <circle cx={hover.x} cy={hover.y} r="3.5" fill={color} stroke="#fff" strokeWidth="1.5"/>
        <rect x={Math.min(hover.x+8,W-80)} y={Math.max(hover.y-24,pad.top)} width="72" height="20" rx="3" fill="#0f172aee" stroke="#334155" strokeWidth="0.5"/>
        <text x={Math.min(hover.x+12,W-76)} y={Math.max(hover.y-10,pad.top+14)} fill={color} fontSize="9" fontWeight="600" fontFamily="'JetBrains Mono'">{hover.v.toFixed(1)}{unit}</text>
        <text x={Math.min(hover.x+52,W-36)} y={Math.max(hover.y-10,pad.top+14)} fill="#64748b" fontSize="7" fontFamily="'JetBrains Mono'">{hover.t}</text>
      </>}
    </svg>
  );
}

/* ═══════ CONTRIBUTING FACTORS ═══════ */
function ContributingFactors({station,lang}){
  const t=T[lang];
  const f=[
    {n:t.moisture,w:0.25,v:station.data.moisture,c:station.soilType==="clay"?65:80},
    {n:t.slopeAngle,w:0.20,v:station.slopeAngle,c:30},
    {n:t.soilType,w:0.15,v:null,c:null},
    {n:t.vibration,w:0.15,v:station.data.vibration?1:0,c:0.5},
    {n:t.rainfall,w:0.10,v:station.data.rainfall,c:10},
    {n:t.historicalRisk,w:0.08,v:null,c:null},
    {n:t.temperature,w:0.04,v:station.data.temperature,c:null},
    {n:t.pressure,w:0.03,v:station.data.pressure,c:null},
  ];
  return(<div style={{display:"flex",flexDirection:"column",gap:4}}>
    {f.map((x,i)=>{const hi=x.c!=null&&x.v!=null&&x.v>=x.c;return(
      <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:11}}>
        <span style={{width:110,color:"#94a3b8",flexShrink:0,fontSize:10}}>{x.n}</span>
        <div style={{flex:1,height:6,background:"#1e293b",borderRadius:3,overflow:"hidden"}}>
          <div style={{width:`${x.w*400}%`,height:"100%",background:hi?"#ef4444":"#3b82f6",borderRadius:3,transition:"width 0.5s"}}/>
        </div>
        <span style={{width:32,textAlign:"right",color:hi?"#ef4444":"#64748b",fontWeight:hi?700:400,fontSize:10}}>{(x.w*100).toFixed(0)}%</span>
      </div>);})}
  </div>);
}

function MapView({stations,selectedId,onSelect,lang}){
  const mapRef=useRef(null),mapObj=useRef(null),markers=useRef({});
  useEffect(()=>{
    if(mapObj.current)return;
    const m=L.map(mapRef.current,{center:[41.0,20.0],zoom:8,zoomControl:false,attributionControl:false});
    L.control.zoom({position:"bottomleft"}).addTo(m);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{maxZoom:19}).addTo(m);
    mapObj.current=m;
    stations.forEach(s=>{
      const c=getRiskColor(s.data.risk);
      const icon=L.divIcon({className:"",iconSize:[16,16],iconAnchor:[8,8],html:mkHTML(s,c,false,lang)});
      const mk=L.marker([s.lat,s.lng],{icon}).addTo(m);
      mk.on("click",()=>onSelect(s.id));
      mk.bindTooltip(s.name,{direction:"top",offset:[0,-14],className:"station-tooltip"});
      markers.current[s.id]=mk;
    });
    return()=>{m.remove();mapObj.current=null;markers.current={};};
  },[]);
  useEffect(()=>{
    stations.forEach(s=>{
      if(!markers.current[s.id]){
        if(!mapObj.current)return;
        const c=getRiskColor(s.data.risk);
        const icon=L.divIcon({className:"",iconSize:[16,16],iconAnchor:[8,8],html:mkHTML(s,c,false,lang)});
        const nm=L.marker([s.lat,s.lng],{icon}).addTo(mapObj.current);
        nm.on("click",()=>onSelect(s.id));
        nm.bindTooltip(s.name,{direction:"top",offset:[0,-14],className:"station-tooltip"});
        markers.current[s.id]=nm;return;
      }
      const mk=markers.current[s.id];
      const c=getRiskColor(s.data.risk),sel=selectedId===s.id,sz=sel?22:16;
      mk.setIcon(L.divIcon({className:"",iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],html:mkHTML(s,c,sel,lang)}));
    });
    // Remove deleted markers
    Object.keys(markers.current).forEach(id=>{
      if(!stations.find(s=>s.id===id)){
        mapObj.current.removeLayer(markers.current[id]);
        delete markers.current[id];
      }
    });
  },[stations,selectedId,lang]);
  return <div ref={mapRef} style={{width:"100%",height:"100%",borderRadius:8}}/>;
}

function mkHTML(s,c,sel,lang){
  const sz=sel?22:16,bd=sel?"3px solid #1e293b":"2px solid #1e293bdd";
  const sh=sel?`0 0 20px ${c}cc,0 0 6px rgba(0,0,0,0.4)`:`0 0 10px ${c}88,0 0 4px rgba(0,0,0,0.2)`;
  const pu=s.isLive?"animation:livePulse 2s infinite;":"";
  const lb=s.isLive?`<div style="position:absolute;top:-22px;left:50%;transform:translateX(-50%);background:#22c55e;color:#000;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.3);">${T[lang].live}</div>`:"";
  const pr=sel?`<div style="position:absolute;top:50%;left:50%;width:${sz}px;height:${sz}px;transform:translate(-50%,-50%);border-radius:50%;border:2px solid ${c};animation:stationPulse 2s infinite;pointer-events:none;"></div>`:"";
  return`<div style="position:relative;width:${sz}px;height:${sz}px;">${pr}<div style="width:${sz}px;height:${sz}px;background:${c};border:${bd};border-radius:50%;box-shadow:${sh};cursor:pointer;transition:all 0.3s;${pu}"></div>${lb}</div>`;
}

/* ═══════ MAIN DASHBOARD ═══════ */
function TerraNodeDashboard(){
  const[lang,setLang]=useState("sq");
  const[selId,setSelId]=useState(null);
  const[stations,setStations]=useState(STATIONS_INIT);
  const[tsMap,setTsMap]=useState(()=>{const m={};STATIONS_INIT.forEach(s=>{m[s.id]=genTS(s)});return m;});
  const[alerts,setAlerts]=useState([]);
  const[showAdd,setShowAdd]=useState(false);
  const[editId,setEditId]=useState(null);
  const[banner,setBanner]=useState(null);
  const weatherTimers=useRef({});
  const liveTimers=useRef({});
  const t=T[lang];
  const sel=stations.find(s=>s.id===selId);
  const editStation=editId?stations.find(s=>s.id===editId):null;
  const tsData=selId&&tsMap[selId]?tsMap[selId]:Object.values(tsMap)[0]||[];

  // Fetch live data from Pi endpoint for a station
  const doLiveFetch=useCallback(async(stationId)=>{
    const st=stations.find(s=>s.id===stationId);
    if(!st||!st.isLive||!st.liveUrl)return;
    const result=await fetchPiLiveData(st.liveUrl);
    setStations(prev=>prev.map(s=>{
      if(s.id!==stationId)return s;
      if(result.success){
        return{...s,piConnected:true,lastPiFetch:Date.now(),
          data:{...s.data,moisture:result.moisture,vibration:result.vibration,
            temperature:result.temperature,pressure:result.pressure,
            rainfall:result.rainfall,humidity:result.humidity,
            windSpeed:result.windSpeed,risk:result.risk}};
      }else{
        return{...s,piConnected:false};
      }
    }));
  },[stations]);

  // Auto-poll live stations every 5 seconds
  useEffect(()=>{
    Object.values(liveTimers.current).forEach(clearInterval);
    liveTimers.current={};
    stations.forEach(s=>{
      if(s.isLive&&s.liveUrl){
        doLiveFetch(s.id);
        liveTimers.current[s.id]=setInterval(()=>doLiveFetch(s.id),5000);
      }
    });
    return()=>Object.values(liveTimers.current).forEach(clearInterval);
  },[stations.map(s=>s.id+s.isLive+s.liveUrl).join(",")]);

  // Fetch weather for a station
  const doWeatherFetch=useCallback(async(stationId,apiKey)=>{
    const st=stations.find(s=>s.id===stationId);
    if(!st||!apiKey)return;
    const result=await fetchOpenWeather(st.lat,st.lng,apiKey);
    if(result.success){
      setStations(prev=>prev.map(s=>s.id===stationId?{...s,
        weatherSource:"live",lastWeatherFetch:Date.now(),owKey:apiKey,
        data:{...s.data,temperature:result.temperature,pressure:result.pressure,
          humidity:result.humidity,windSpeed:result.windSpeed,rainfall:result.rainfall}
      }:s));
    }
  },[stations]);

  // Setup 20-min weather auto-fetch for stations with API keys
  useEffect(()=>{
    // Clear old timers
    Object.values(weatherTimers.current).forEach(clearInterval);
    weatherTimers.current={};
    // Set new timers
    stations.forEach(s=>{
      if(s.owKey){
        // Initial fetch
        doWeatherFetch(s.id,s.owKey);
        // 20 minute interval
        weatherTimers.current[s.id]=setInterval(()=>{
          doWeatherFetch(s.id,s.owKey);
        },20*60*1000);
      }
    });
    return()=>Object.values(weatherTimers.current).forEach(clearInterval);
  },[stations.map(s=>s.id+s.owKey).join(",")]);

  // Simulation tick
  useEffect(()=>{
    const iv=setInterval(()=>{
      setStations(prev=>{
        const next=prev.map(simStep);
        next.forEach(s=>{const old=prev.find(p=>p.id===s.id);if(old){
          if((old.data.risk<30&&s.data.risk>=30)||(old.data.risk<70&&s.data.risk>=70)){
            const lv=s.data.risk>=70?"RED":"YELLOW";
            const al={id:Date.now()+Math.random(),station:s.name,risk:s.data.risk,level:lv,time:new Date().toLocaleTimeString()};
            setAlerts(a=>[al,...a].slice(0,20));setBanner(al);setTimeout(()=>setBanner(null),5000);
          }}});
        // Append current readings to time series
        setTsMap(p=>{
          const m={...p};
          next.forEach(s=>{
            const arr=m[s.id]?[...m[s.id]]:[];
            arr.push({
              time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
              timestamp:Date.now(),moisture:s.data.moisture,temperature:s.data.temperature,
              pressure:s.data.pressure,risk:s.data.risk,
            });
            // Keep max 96 points (24h at 15min, but we append every 3s — trim old)
            if(arr.length>200)arr.splice(0,arr.length-200);
            m[s.id]=arr;
          });
          return m;
        });
        return next;});
    },3000);return()=>clearInterval(iv);
  },[]);

  const addSt=s=>{setStations(p=>[...p,s]);setTsMap(p=>({...p,[s.id]:genTS(s)}));};
  const updateSt=s=>{setStations(p=>p.map(x=>x.id===s.id?{...x,...s}:x));};
  const deleteSt=id=>{setStations(p=>p.filter(s=>s.id!==id));if(selId===id)setSelId(null);};

  const cnt=stations.length;
  const avg=(stations.reduce((a,s)=>a+s.data.risk,0)/stations.length).toFixed(1);
  const laText=alerts.length>0?`${alerts[0].station} — ${alerts[0].risk.toFixed(0)}%`:t.noAlerts;
  const laColor=alerts.length>0?(alerts[0].level==="RED"?"#ef4444":"#f59e0b"):"#64748b";
  const owLiveCount=stations.filter(s=>s.weatherSource==="live").length;
  const piLiveCount=stations.filter(s=>s.piConnected).length;

  const card={background:"linear-gradient(135deg,#0f172aee,#1e293bee)",border:"1px solid #1e293b",borderRadius:8,padding:14};
  const sC=a=>({background:a?"rgba(239,68,68,0.08)":"rgba(30,41,59,0.6)",border:`1px solid ${a?"rgba(239,68,68,0.3)":"#334155"}`,borderRadius:6,padding:"10px 12px",display:"flex",flexDirection:"column",gap:4});
  const sL={fontSize:10,color:"#64748b",marginBottom:6,textTransform:"uppercase",letterSpacing:1};

  return(
    <div style={{width:"100%",height:"100vh",background:"linear-gradient(180deg,#020617 0%,#0a0f1a 30%,#0f172a 100%)",color:"#e2e8f0",fontFamily:"'JetBrains Mono',monospace",fontSize:13,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
      {banner&&<div style={{position:"absolute",top:52,left:"50%",zIndex:9998,background:banner.level==="RED"?"rgba(239,68,68,0.15)":"rgba(245,158,11,0.15)",border:`1px solid ${banner.level==="RED"?"#ef4444":"#f59e0b"}`,borderRadius:8,padding:"8px 20px",backdropFilter:"blur(10px)",animation:"alertBanner 5s forwards",display:"flex",alignItems:"center",gap:10,boxShadow:`0 4px 20px ${banner.level==="RED"?"rgba(239,68,68,0.3)":"rgba(245,158,11,0.3)"}`}}>
        <span style={{fontSize:16}}>{banner.level==="RED"?"🔴":"🟡"}</span>
        <span style={{fontSize:12,fontWeight:600,color:banner.level==="RED"?"#ef4444":"#f59e0b"}}>{banner.station} — {banner.risk.toFixed(0)}% {getRiskLabel(banner.risk,lang)}</span>
      </div>}
      {showAdd&&<AddStationPanel lang={lang} onAdd={addSt} onClose={()=>setShowAdd(false)}/>}
      {editStation&&<StationSettings station={editStation} lang={lang} onSave={updateSt} onDelete={deleteSt} onClose={()=>setEditId(null)} onRefreshWeather={doWeatherFetch}/>}

      {/* HEADER */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 20px",borderBottom:"1px solid #1e293b",background:"rgba(2,6,23,0.8)",backdropFilter:"blur(10px)",flexShrink:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:32,height:32,borderRadius:6,background:"linear-gradient(135deg,#22c55e,#16a34a)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:16,color:"#000",boxShadow:"0 0 12px rgba(34,197,94,0.3)"}}>T</div>
          <div><div style={{fontSize:15,fontWeight:700,letterSpacing:1,color:"#f8fafc"}}>{t.subtitle}</div>
          <div style={{fontSize:10,color:"#64748b",letterSpacing:0.5,marginTop:1}}>{t.title}</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>setShowAdd(true)} title={t.addStation} style={{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:6,padding:"5px 10px",color:"#22c55e",cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"'JetBrains Mono'"}}>+ {t.addStation}</button>
          <div style={{display:"flex",gap:0,borderRadius:6,overflow:"hidden",border:"1px solid #334155"}}>
            {["sq","en"].map(l=>(<button key={l} onClick={()=>setLang(l)} style={{padding:"5px 14px",background:lang===l?"#22c55e":"transparent",color:lang===l?"#000":"#64748b",border:"none",cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{l.toUpperCase()}</button>))}
          </div>
        </div>
      </div>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",gap:12,padding:12,overflow:"hidden",minHeight:0}}>
        {/* MAP */}
        <div style={{flex:"0 0 60%",...card,padding:0,overflow:"hidden",position:"relative"}}>
          <MapView stations={stations} selectedId={selId} onSelect={setSelId} lang={lang}/>
          <div style={{position:"absolute",top:12,left:12,zIndex:1000,background:"rgba(2,6,23,0.85)",backdropFilter:"blur(8px)",padding:"6px 12px",borderRadius:6,border:"1px solid #1e293b",fontSize:10,color:"#64748b"}}>{t.stations}: <span style={{color:"#22c55e",fontWeight:600}}>{cnt}</span> {t.online}</div>
        </div>

        {/* RIGHT PANEL */}
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:12,overflow:"auto",minWidth:0}}>
          {sel?(<div style={{...card,display:"flex",flexDirection:"column",gap:12}}>
            {/* Header with settings button */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:16,fontWeight:700,color:"#f8fafc"}}>{sel.name}</span>
                  {sel.isLive&&<span style={{fontSize:9,background:sel.piConnected?"#22c55e":"#ef4444",color:sel.piConnected?"#000":"#fff",padding:"2px 6px",borderRadius:3,fontWeight:700}}>{sel.piConnected?"● CONNECTED":"● OFFLINE"}</span>}
                  <button onClick={()=>setEditId(sel.id)} style={{background:"rgba(30,41,59,0.6)",border:"1px solid #334155",borderRadius:4,padding:"2px 6px",color:"#64748b",cursor:"pointer",fontSize:12,lineHeight:1}} title={t.settings}>⚙</button>
                  {sel.isLive&&sel.liveUrl&&<button onClick={()=>doLiveFetch(sel.id)} style={{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:4,padding:"2px 6px",color:"#22c55e",cursor:"pointer",fontSize:9,fontWeight:600,fontFamily:"'JetBrains Mono'"}}>↻ {t.refreshNow}</button>}
                </div>
                <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{sel.lat.toFixed(3)}°N, {sel.lng.toFixed(3)}°E</div>
              </div>
              <div style={{width:64,height:64,borderRadius:"50%",background:`radial-gradient(circle,${getRiskColor(sel.data.risk)}22,transparent)`,border:`3px solid ${getRiskColor(sel.data.risk)}`,boxShadow:getRiskGlow(sel.data.risk),display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",transition:"all 0.5s"}}>
                <span style={{fontSize:18,fontWeight:700,color:getRiskColor(sel.data.risk)}}>{sel.data.risk.toFixed(0)}%</span>
                <span style={{fontSize:7,fontWeight:600,color:getRiskColor(sel.data.risk),letterSpacing:0.5}}>{getRiskLabel(sel.data.risk,lang)}</span>
              </div>
            </div>

            {/* Sensors */}
            <div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",...sL}}>
              <span>{t.sensorReadings}</span>
              {sel.piConnected&&<span style={{fontSize:8,color:"#22c55e",fontWeight:700,background:"rgba(34,197,94,0.1)",padding:"2px 6px",borderRadius:3,border:"1px solid rgba(34,197,94,0.2)",textTransform:"none"}}>● Pi {t.live} — {sel.lastPiFetch?timeAgo(sel.lastPiFetch):""}</span>}
            </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div style={sC(sel.data.moisture>65)}><span style={{fontSize:9,color:"#64748b"}}>{t.moisture}</span><span style={{fontSize:18,fontWeight:700,color:sel.data.moisture>65?"#ef4444":"#3b82f6"}}>{sel.data.moisture}%</span></div>
                <div style={sC(sel.data.vibration)}><span style={{fontSize:9,color:"#64748b"}}>{t.vibration}</span><span style={{fontSize:18,fontWeight:700,color:sel.data.vibration?"#ef4444":"#22c55e"}}>{sel.data.vibration?t.yes:t.no}</span></div>
                <div style={sC(false)}><span style={{fontSize:9,color:"#64748b"}}>{t.temperature}</span><span style={{fontSize:18,fontWeight:700,color:"#f59e0b"}}>{sel.data.temperature}°C</span></div>
                <div style={sC(sel.data.pressure<1005)}><span style={{fontSize:9,color:"#64748b"}}>{t.pressure}</span><span style={{fontSize:18,fontWeight:700,color:sel.data.pressure<1005?"#f59e0b":"#94a3b8"}}>{sel.data.pressure} hPa</span></div>
              </div>
            </div>

            {/* Weather with source badge + refresh */}
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={sL}>{t.weatherData}</div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  {sel.weatherSource==="live"?
                    <span style={{fontSize:8,color:"#22c55e",fontWeight:700,background:"rgba(34,197,94,0.1)",padding:"2px 6px",borderRadius:3,border:"1px solid rgba(34,197,94,0.2)"}}>● {t.weatherLive}</span>
                    :<span style={{fontSize:8,color:"#64748b",fontWeight:600,background:"rgba(100,116,139,0.1)",padding:"2px 6px",borderRadius:3}}>{t.weatherSim}</span>
                  }
                  {sel.owKey&&<button onClick={()=>doWeatherFetch(sel.id,sel.owKey)}
                    style={{background:"none",border:"1px solid #334155",borderRadius:3,padding:"2px 6px",color:"#64748b",cursor:"pointer",fontSize:9,fontFamily:"'JetBrains Mono'"}}>↻</button>}
                  {sel.lastWeatherFetch&&<span style={{fontSize:8,color:"#475569"}}>{timeAgo(sel.lastWeatherFetch)}</span>}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {[{l:t.rainfall,v:`${sel.data.rainfall} mm/h`,c:"#3b82f6"},{l:t.humidity,v:`${sel.data.humidity}%`,c:"#06b6d4"},{l:t.windSpeed,v:`${sel.data.windSpeed} m/s`,c:"#8b5cf6"}].map((w,i)=>(
                  <div key={i} style={{background:"rgba(30,41,59,0.4)",borderRadius:6,padding:"8px 10px",border:"1px solid #1e293b"}}><div style={{fontSize:9,color:"#64748b"}}>{w.l}</div><div style={{fontSize:14,fontWeight:600,color:w.c,marginTop:2}}>{w.v}</div></div>
                ))}
              </div>
            </div>

            {/* Static params */}
            <div><div style={sL}>{t.staticParams}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[{l:t.soilType,v:t[sel.soilType]||sel.soilType},{l:t.slopeAngle,v:`${sel.slopeAngle}°`},{l:t.elevation,v:`${sel.elevation}m`},{l:t.historicalRisk,v:t[sel.historicalRisk]||sel.historicalRisk}].map((p,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 10px",background:"rgba(30,41,59,0.3)",borderRadius:4,border:"1px solid #1e293b"}}><span style={{fontSize:10,color:"#64748b"}}>{p.l}</span><span style={{fontSize:11,fontWeight:600,color:"#cbd5e1"}}>{p.v}</span></div>
                ))}
              </div>
            </div>

            <div><div style={sL}>{t.contributing}</div><ContributingFactors station={sel} lang={lang}/></div>

            {alerts.filter(a=>a.station===sel.name).length>0&&(<div><div style={sL}>{t.alertHistory}</div>
              <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:80,overflow:"auto"}}>
                {alerts.filter(a=>a.station===sel.name).map(a=>(
                  <div key={a.id} style={{display:"flex",justifyContent:"space-between",fontSize:10,padding:"4px 8px",background:a.level==="RED"?"rgba(239,68,68,0.1)":"rgba(245,158,11,0.1)",borderRadius:4,border:`1px solid ${a.level==="RED"?"rgba(239,68,68,0.2)":"rgba(245,158,11,0.2)"}`}}>
                    <span style={{color:a.level==="RED"?"#ef4444":"#f59e0b"}}>{a.level} — {a.risk.toFixed(0)}%</span><span style={{color:"#64748b"}}>{a.time}</span>
                  </div>))}
              </div>
            </div>)}
          </div>):(<div style={{...card,display:"flex",alignItems:"center",justifyContent:"center",minHeight:200,color:"#475569"}}><div style={{textAlign:"center"}}><div style={{fontSize:32,marginBottom:8,opacity:0.3}}>◉</div><div style={{fontSize:12}}>{t.selectStation}</div></div></div>)}

          {/* GRAPHS */}
          <div style={{...card,display:"flex",flexDirection:"column",gap:10}}>
            <div style={sL}>{t.graphs24h}{sel?` — ${sel.name}`:""}</div>
            {[{l:t.moistureGraph,k:"moisture",c:"#3b82f6",u:"%",th:[{value:65,color:"#ef4444"},{value:30,color:"#22c55e"}]},
              {l:t.riskGraph,k:"risk",c:"#ef4444",u:"%",th:[{value:70,color:"#ef4444"},{value:30,color:"#f59e0b"}]},
              {l:t.tempPressure,k:"temperature",c:"#f59e0b",u:"°C",th:[]}
            ].map((g,i)=>(
              <div key={i} style={{background:"rgba(15,23,42,0.5)",borderRadius:6,padding:"8px 10px",border:"1px solid #1e293b"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <span style={{fontSize:10,color:"#94a3b8"}}>{g.l}</span>
                  <span style={{fontSize:11,fontWeight:600,color:g.c}}>{tsData.length>0?tsData[tsData.length-1][g.k]:"—"}{g.u}</span>
                </div>
                <InteractiveGraph data={tsData} dataKey={g.k} color={g.c} unit={g.u} thresholds={g.th}/>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* STATUS BAR */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 20px",borderTop:"1px solid #1e293b",background:"rgba(2,6,23,0.9)",backdropFilter:"blur(10px)",fontSize:11,flexShrink:0,gap:20,flexWrap:"wrap"}}>
        {[{l:t.stations,v:`${cnt} ${t.online}`,c:"#22c55e",d:true},
          {l:t.avgRisk,v:`${avg}%`,c:getRiskColor(parseFloat(avg))},
          {l:t.lastAlert,v:laText,c:laColor},
          {l:t.firmsStatus,v:`${t.active} — ${t.lastCheck}: 6h`,c:"#f59e0b"},
          {l:t.weatherStatus,v:owLiveCount>0?`${owLiveCount}/${cnt} ${t.weatherLive}`:t.active,c:owLiveCount>0?"#22c55e":"#3b82f6"},
        ].map((x,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
            {x.d&&<div style={{width:6,height:6,borderRadius:"50%",background:x.c,boxShadow:`0 0 6px ${x.c}88`}}/>}
            <span style={{color:"#475569"}}>{x.l}:</span><span style={{color:x.c,fontWeight:500}}>{x.v}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TerraNodeDashboard/>);
</script>
</body>
</html>
